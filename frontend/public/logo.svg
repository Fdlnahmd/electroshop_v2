<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 150" width="100%" height="100%">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F2FE" />
      <stop offset="50%" stop-color="#4FACFE" />
      <stop offset="100%" stop-color="#0000FF" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Icon on the left -->
  <g transform="translate(15, 10) scale(0.25)">
    <!-- Outer ring -->
    <path d="M 360,180 A 130,130 0 1,1 152,180" fill="none" stroke="url(#grad)" stroke-width="36" stroke-linecap="round" filter="url(#glow)" />
    <!-- Inner lightning bolt -->
    <path d="M 280,100 L 190,260 H 290 L 220,410 L 370,220 H 260 L 310,100 Z" fill="url(#grad)" filter="url(#glow)" />
  </g>
  <!-- Text on the right -->
  <text x="165" y="92" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="56" letter-spacing="-1.5px" fill="#1A1A2E">Electro<tspan fill="url(#grad)">Shop</tspan></text>
</svg>
